name: BUKC LMS Sync Engine

on:
  schedule:
    # 8 AM, 2 PM, 9 PM PKT matches 3 AM, 9 AM, 4 PM UTC
    - cron: '0 3,9,16 * * *'
  workflow_dispatch: # Allows you to trigger the scraper manually via the GitHub UI

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v5 #  Fixed: Changed from checkout to setup-python
      with:
        python-version: '3.11'

    - name: Install Scraping Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 firebase-admin

    - name: Restore Scraper State Cache
      uses: actions/cache@v4
      with:
        path: scraper/last_known_state.json
        key: scraper-state-${{ github.run_id }}
        restore-keys: |
          scraper-state-

    - name: Execute Handshake Scraper Pipeline
      env:
        ENROLLMENT: ${{ secrets.ENROLLMENT }}
        PASSWORD: ${{ secrets.PASSWORD }}
        FCM_DEVICE_TOKEN: ${{ secrets.FCM_DEVICE_TOKEN }}
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      run: |
        python scraper/check_lms.py

    - name: Save Scraper State Cache
      if: always()
      uses: actions/cache@v4
      with:
        path: scraper/last_known_state.json
        key: scraper-state-${{ github.run_id }}